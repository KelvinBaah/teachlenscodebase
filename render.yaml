services:
  - type: web
    name: teachlens-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: RAW_UPLOAD_RETENTION_DAYS
        value: "30"
      - key: DETAIL_RECORD_RETENTION_DAYS
        value: "365"
      - key: CLEANUP_BATCH_SIZE
        value: "200"
      - key: SUPABASE_STORAGE_BUCKET_RAW_UPLOADS
        value: raw-assessments
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
